name: VPS Docker Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0'

jobs:
  publish:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '--no-ci')"
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.value }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set build number and image name
        id: image
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}:${BUILD_NUMBER}
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> $GITHUB_ENV
          echo "value=${IMAGE_NAME}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image.outputs.value }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deployer
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: MINIO_SECRET_KEY,TOKEN_SECRET,IMAGE
          script: |
            export HOME=/home/deployer
            docker pull $IMAGE
            docker stop dailyonerosterfile || true
            docker rm dailyonerosterfile || true
            docker run -d -p 5000:5000 --name dailyonerosterfile \
              --network bergerb-infrastructure_default \
              -e ASPNETCORE_ENVIRONMENT=Test \
              -e Storage__MinioSecretKey=$MINIO_SECRET_KEY \
              -e Storage__TokenSecret=$TOKEN_SECRET \
              $IMAGE
        env:
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          TOKEN_SECRET: ${{ secrets.TOKEN_SECRET }}
          IMAGE: ${{ needs.publish.outputs.image }}
