services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - github_token
    container_name: daily-oneroster-app
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_URLS=http://+:5000
    volumes:
      - generated_files:/app/GeneratedFiles
    restart: unless-stopped

volumes:
  generated_files:

secrets:
  github_token:
    environment: GITHUB_TOKEN
